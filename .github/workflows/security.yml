name: Security — Scan hebdomadaire

on:
  schedule:
    - cron: "0 2 * * 1"  # Chaque lundi à 02h00 UTC
  workflow_dispatch:       # Déclenchement manuel possible

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # npm audit (dépendances Node.js)
  # ─────────────────────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: "9"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: npm audit — API
        run: |
          cd apps/api
          pnpm audit --audit-level moderate || true

      - name: npm audit — Web
        run: |
          cd apps/web
          pnpm audit --audit-level moderate || true

      - name: npm audit — rapport global
        run: pnpm audit --audit-level high

  # ─────────────────────────────────────────────────────────────────────────────
  # Safety (dépendances Python)
  # ─────────────────────────────────────────────────────────────────────────────
  python-safety:
    name: Safety (Python dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Safety
        run: pip install safety

      - name: Run Safety scan
        run: |
          cd apps/ai-service
          pip install -r requirements.txt
          safety check --full-report -r requirements.txt

  # ─────────────────────────────────────────────────────────────────────────────
  # Trivy — scan des images Docker
  # ─────────────────────────────────────────────────────────────────────────────
  trivy-scan:
    name: Trivy — Docker image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          load: true
          tags: gestmoney-api:scan

      - name: Trivy scan — API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gestmoney-api:scan
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF — API
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      - name: Build Web image (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: false
          load: true
          tags: gestmoney-web:scan

      - name: Trivy scan — Web image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: gestmoney-web:scan
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF — Web
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web

      - name: Trivy scan filesystem (IaC + secrets)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          scanners: vuln,secret,config

      - name: Upload Trivy SARIF — filesystem
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  # ─────────────────────────────────────────────────────────────────────────────
  # CodeQL — analyse statique du code
  # ─────────────────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [typescript, python]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Notification récapitulative
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Rapport de sécurité
    runs-on: ubuntu-latest
    needs: [npm-audit, python-safety, trivy-scan, codeql]
    if: always()

    steps:
      - name: Résumé des scans
        run: |
          echo "## Résultats des scans de sécurité" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| npm audit | ${{ needs.npm-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Safety | ${{ needs.python-safety.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Docker scan | ${{ needs.trivy-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
