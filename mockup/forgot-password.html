<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GESTMONEY — Mot de passe oublié</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #F5B800;
  --gold-dark: #C99600;
  --gold-light: rgba(245,184,0,0.10);
  --bg: #F7F8FC;
  --surface: #FFFFFF;
  --text-primary: #111520;
  --text-secondary: #6B7488;
  --text-placeholder: #A0A8BE;
  --border: #E4E7F0;
  --input-bg: #F7F8FC;
  --success: #22C55E;
  --success-bg: rgba(34,197,94,0.08);
  --success-border: rgba(34,197,94,0.25);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0F1117;
    --surface: #161A26;
    --text-primary: #ECEEF5;
    --text-secondary: #8890AA;
    --text-placeholder: #5A6280;
    --border: #252B3E;
    --input-bg: #1A1F30;
  }
}

:root[data-theme="dark"] {
  --bg: #0F1117; --surface: #161A26; --text-primary: #ECEEF5;
  --text-secondary: #8890AA; --text-placeholder: #5A6280;
  --border: #252B3E; --input-bg: #1A1F30;
}

:root[data-theme="light"] {
  --bg: #F7F8FC; --surface: #FFFFFF; --text-primary: #111520;
  --text-secondary: #6B7488; --text-placeholder: #A0A8BE;
  --border: #E4E7F0; --input-bg: #F7F8FC;
}

html, body {
  min-height: 100%;
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  background: var(--bg);
  color: var(--text-primary);
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 20px;
}

/* Subtle radial bg */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 50vh;
  background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(245,184,0,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.card {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  box-shadow: 0 8px 40px rgba(15,17,23,0.08);
  position: relative;
  animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Logo */
.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 32px;
}

.logo-icon {
  width: 44px;
  height: 44px;
  background: #0F1117;
  border-radius: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 16px rgba(245,184,0,0.25);
}

.logo-text {
  font-size: 20px;
  font-weight: 800;
  color: var(--text-primary);
  letter-spacing: -0.4px;
}

/* Icon illustration */
.illus {
  width: 64px;
  height: 64px;
  border-radius: 18px;
  background: var(--gold-light);
  border: 1px solid rgba(245,184,0,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 28px;
}

.card-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-primary);
  text-align: center;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
  text-wrap: balance;
}

.card-desc {
  font-size: 14px;
  color: var(--text-secondary);
  text-align: center;
  line-height: 1.6;
  margin-bottom: 28px;
}

/* Form */
.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  letter-spacing: 0.03em;
}

.input-wrap {
  position: relative;
}

.input-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-placeholder);
  pointer-events: none;
  transition: color 0.2s;
}

.input-wrap input:focus ~ svg,
.input-wrap input:not(:placeholder-shown) ~ svg {
  color: var(--gold-dark);
}

.input-wrap input {
  width: 100%;
  padding: 13px 14px 13px 42px;
  background: var(--input-bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-wrap input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(245,184,0,0.12);
  background: var(--surface);
}

.input-wrap input::placeholder { color: var(--text-placeholder); }

/* Submit button */
.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--gold);
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  color: #111520;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 4px;
}

.btn-primary:hover:not(:disabled) {
  background: #FFCA1A;
  box-shadow: 0 6px 24px rgba(245,184,0,0.30);
  transform: translateY(-1px);
}

.btn-primary:active:not(:disabled) { transform: translateY(0); }
.btn-primary:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; }
.btn-primary:disabled { opacity: 0.75; cursor: not-allowed; }

/* Spinner */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.15);
  border-top-color: #111520;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-primary.loading .spinner { display: block; }

/* Success state */
.success-box {
  display: none;
  background: var(--success-bg);
  border: 1px solid var(--success-border);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  margin-bottom: 20px;
}

.success-box.visible { display: block; }

.success-icon {
  font-size: 36px;
  margin-bottom: 10px;
  display: block;
}

.success-title {
  font-size: 15px;
  font-weight: 700;
  color: #16a34a;
  margin-bottom: 6px;
}

.success-email {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.success-email strong {
  color: var(--text-primary);
  font-weight: 600;
}

/* Back link */
.back-link {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 24px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  text-decoration: none;
  transition: color 0.15s;
}

.back-link:hover { color: var(--text-primary); }

.back-link svg { flex-shrink: 0; }

/* Footer */
.page-footer {
  margin-top: 32px;
  font-size: 11px;
  color: var(--text-placeholder);
  text-align: center;
}

@media (prefers-reduced-motion: reduce) {
  .card { animation: none; }
  .btn-primary { transition: none; }
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🪙</div>
    <span class="logo-text">GESTMONEY</span>
  </div>

  <div class="illus">🔑</div>
  <h1 class="card-title">Réinitialisation du mot de passe</h1>
  <p class="card-desc">Saisissez l'adresse email associée à votre compte. Nous vous enverrons un lien pour créer un nouveau mot de passe.</p>

  <!-- Success feedback -->
  <div class="success-box" id="successBox">
    <span class="success-icon">✉️</span>
    <div class="success-title">Email envoyé avec succès</div>
    <p class="success-email">Un lien de réinitialisation a été envoyé à<br><strong id="confirmedEmail"></strong></p>
  </div>

  <!-- Form -->
  <form id="forgotForm" novalidate>
    <div class="form-group">
      <label for="email">Adresse email</label>
      <div class="input-wrap">
        <input type="email" id="email" placeholder="votre@email.com" autocomplete="email" required>
        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
          <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
          <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
        </svg>
      </div>
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">
      <div class="spinner" id="spinner"></div>
      <span class="btn-text">Envoyer le lien de réinitialisation</span>
    </button>
  </form>

  <a href="login.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"/>
    </svg>
    Retour à la connexion
  </a>
</div>

<div class="page-footer">© 2026 IBIG SOFT — Tous droits réservés</div>

<script>
const form = document.getElementById('forgotForm');
const submitBtn = document.getElementById('submitBtn');
const spinner = document.getElementById('spinner');
const successBox = document.getElementById('successBox');
const confirmedEmail = document.getElementById('confirmedEmail');

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) return;

  submitBtn.classList.add('loading');
  submitBtn.disabled = true;

  setTimeout(() => {
    submitBtn.classList.remove('loading');
    submitBtn.disabled = false;

    // Show success
    confirmedEmail.textContent = email;
    successBox.classList.add('visible');
    form.style.display = 'none';
  }, 1800);
});
</script>
</body>
</html>
