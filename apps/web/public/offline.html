<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors ligne — GESTMONEY</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111111;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 32px;
    }
    .logo span:first-child { color: #009E00; }
    .logo span:last-child { color: #FFD000; }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #ffffff;
    }
    p {
      color: #999999;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #009E00;
      color: #ffffff;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-size: 1rem;
    }
    .btn:hover { background: #007a00; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>GEST</span><span>MONEY</span></div>
    <div class="icon">📡</div>
    <h1>Vous êtes hors ligne</h1>
    <p>
      Vérifiez votre connexion internet et réessayez.<br />
      Les données de votre dernière session restent accessibles en cache.
    </p>
    <button class="btn" onclick="window.location.reload()">Réessayer</button>
  </div>
</body>
</html>
