version: '3.9'

# Override pour le développement local
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  postgres:
    environment:
      POSTGRES_DB: gestmoney_dev
      POSTGRES_USER: gestmoney_dev
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    command: redis-server --loglevel verbose
    ports:
      - "6379:6379"

  elasticsearch:
    environment:
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - logger.level=WARN
    ports:
      - "9200:9200"

  # Adminer - UI admin PostgreSQL pour le dev
  adminer:
    image: adminer:latest
    container_name: gestmoney_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      - postgres
    networks:
      - gestmoney_network

  # Redis Commander - UI admin Redis pour le dev
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: gestmoney_redis_commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - gestmoney_network

  # MailHog actif par défaut en dev
  mailhog:
    profiles: []  # Supprime le profile pour activer par défaut en dev

volumes:
  postgres_dev_data:
    driver: local
