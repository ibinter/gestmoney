version: '3.9'

services:
  # ----------------------------------------------------------------------------
  # PostgreSQL - Base de données principale
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: gestmoney_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestmoney_db}
      POSTGRES_USER: ${POSTGRES_USER:-gestmoney_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gestmoney_pass}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=fr_FR.UTF-8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - gestmoney_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestmoney_user} -d ${POSTGRES_DB:-gestmoney_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------------
  # Redis - Cache & Queue
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: gestmoney_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 900 1
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - gestmoney_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Elasticsearch - Recherche & Analytique
  # ----------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: gestmoney_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - cluster.name=gestmoney-cluster
      - node.name=gestmoney-node-01
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - gestmoney_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------------------------
  # Kibana - Dashboard Elasticsearch (optionnel)
  # ----------------------------------------------------------------------------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: gestmoney_kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=gestmoney-kibana
      - SERVER_BASEPATH=/kibana
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - gestmoney_network
    profiles:
      - monitoring

  # ----------------------------------------------------------------------------
  # MinIO - Stockage fichiers compatible S3
  # ----------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: gestmoney_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - gestmoney_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------------------------
  # MailHog - Serveur mail de test
  # ----------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: gestmoney_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - gestmoney_network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  minio_data:
    driver: local

networks:
  gestmoney_network:
    driver: bridge
    name: gestmoney_network
